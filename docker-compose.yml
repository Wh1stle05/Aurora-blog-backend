version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blogpass
      POSTGRES_DB: blogdb
    ports:
      - "5432:5432"
    volumes:
      - aurora_pg:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://blog:blogpass@db:5432/blogdb
      - ENV=${ENV:-dev}
      - JWT_SECRET=${JWT_SECRET:-supersecret-change-me}
      - JWT_EXPIRES_MINUTES=${JWT_EXPIRES_MINUTES:-120}
      - ADMIN_EMAILS=a3165140148@outlook.com
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM=${RESEND_FROM:-Aurora Blog <onboarding@resend.dev>}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL:-}
      - REFRESH_TOKEN_EXPIRES_DAYS=${REFRESH_TOKEN_EXPIRES_DAYS:-30}
      - REFRESH_TOKEN_PEPPER=${REFRESH_TOKEN_PEPPER:-change-me}
    ports:
      - "8000:8000"
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot:/var/www/certbot
      - ./nginx/letsencrypt:/etc/letsencrypt
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/certbot:/var/www/certbot
      - ./nginx/letsencrypt:/etc/letsencrypt

volumes:
  aurora_pg:
